[include mainsail.cfg]
[exclude_object]

[include KAMP_Settings.cfg] ; ##### (UNCOMMENT IF USING KAMP)
[include start.cfg]
[include end.cfg]
[include macros.cfg]

[pause_resume]

[display_status]

[virtual_sdcard]
path: /home/orangepi/printer_data/gcodes ; Path may be different for your install, your web interface will give you and error for the expected path, copy and paste expected path here
on_error_gcode: CANCEL_PRINT

[mcu]
serial:  /dev/serial/by-id/usb-Klipper_stm32f401xc_4B006F001151383531393138-if00  ; check and replace your own mcu id

[printer]
kinematics: cartesian
max_velocity: 200
max_accel: 5000
max_z_velocity: 50
max_z_accel: 400
square_corner_velocity: 5.0

[filament_switch_sensor filament]
pause_on_runout: True # Starts the PAUSE g-code script if filament runs out
runout_gcode: M117 Filament runout # Optional
insert_gcode: M117 Filament insert # Optional
switch_pin: PA0 # the z-endstop pin

#############################
# INPUT SHAPER
#############################

[input_shaper]
shaper_type_x: mzv
shaper_freq_x: 63.0
shaper_type_y: ei
shaper_freq_y: 44.8

#[mcu host]
#serial: /tmp/klipper_host_mcu
#
#[adxl345]
#cs_pin: host:None
#spi_bus: spidev3.0
#spi_speed: 2000000 
#axes_map: x, y, z 
#
#[resonance_tester]
#accel_chip: adxl345
#probe_points:
#    150, 150, 20

#############################
# MOTION AXES
#############################

[stepper_x]
step_pin: !PB14
dir_pin: !PB13
enable_pin: !PB15
microsteps: 16
rotation_distance: 39.94
endstop_pin: !PA2
position_endstop: 0
position_max: 300
homing_speed: 40
#second_homing_speed: 10
step_pulse_duration: 0.000002

[tmc2209 stepper_x]
uart_pin: PB4 # the pin in EXT connector that i connected to uart pin of driver 
# Motor 17HS4401S (1.7A rated). Current set to ~65%
run_current: 1.1
#hold_current: 0.5
interpolate: True
stealthchop_threshold: 99999
sense_resistor: 0.110 # For BTT TMC2209 v1.3
#driver_HSTRT: 1
#driver_HEND: 2

# ------------------------------------------------------------------
# Y-AXIS (BTT TMC2209 v1.3 in UART Mode)
# ------------------------------------------------------------------
[stepper_y]
step_pin: PB10
dir_pin: !PB2
enable_pin: !PB12
microsteps: 16
rotation_distance: 39.94
endstop_pin: !PA1
position_endstop: 0
position_max: 300
homing_speed: 40
#second_homing_speed: 10
step_pulse_duration: 0.000002

[tmc2209 stepper_y]
uart_pin: PB3
# Motor 17HS8401S (1.7A rated). Current set to ~65%
run_current: 1.1
#hold_current: 0.5
interpolate: True
stealthchop_threshold: 99999
sense_resistor: 0.110 # For BTT TMC2209 v1.3
#driver_HSTRT: 2
#driver_HEND: 3

[stepper_z]
step_pin: PB0
dir_pin: !PC5
enable_pin: !PB1
microsteps: 16
rotation_distance: 7.96
endstop_pin: probe:z_virtual_endstop
position_max: 400
position_min: -5
homing_speed: 25
second_homing_speed: 10

[extruder]
step_pin: PA7
dir_pin: PA6
enable_pin: !PC4
microsteps: 16
rotation_distance: 21.8667 # stock is "rotation_distance: 21.8667"
gear_ratio: 66:22
nozzle_diameter: 0.400
filament_diameter: 1.750
max_extrude_only_distance: 1000
max_extrude_cross_section: 5
heater_pin: PC9
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC0
min_temp: -40
max_temp: 300
pressure_advance = 0.055
# pressure_advance and PID values will be loaded from the #*# SAVE_CONFIG block

# [firmware_retraction]
# retract_length: 1.2
# retract_speed: 40
# unretract_extra_length: 0.1
# unretract_speed: 25

[gcode_arcs]
resolution: 1.0

#############################
# THERMAL SETTINGS
#############################

[extruder]
heater_pin: PC9
#sensor_type: Generic 3950 ; Common sensor for all metal solution, always reffer to your sensors documentation and the Klipper config refference to ensure correct deffinition
sensor_type: EPCOS 100K B57560G104F ; Stock sensor
sensor_pin: PC0
#control: pid
#pid_kp: 23.509
#pid_ki: 1.438
#pid_kd: 96.092
min_temp: 0
max_temp: 300

[heater_bed]
heater_pin: PA8
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC1
control: pid
pid_kp: 42.365
pid_ki: 0.545
pid_kd: 822.940
min_temp: 0
max_temp: 130

[fan]
pin: PC8
off_below: 0.1

[heater_fan extruder]
pin: PC7
off_below: 0.2

[controller_fan case]
pin: PC6
off_below: 0.3
idle_speed: 0.0

[temperature_sensor mainboard]
sensor_type: temperature_mcu
min_temp: 10
max_temp: 60

[temperature_sensor Orange_Pi]
sensor_type: temperature_host
min_temp: 10
max_temp: 100

#############################
# LEVELING
#############################

[safe_z_home]
home_xy_position: 152,123
z_hop: 10
speed: 125

[bltouch]
sensor_pin: PC2
control_pin: PC3
x_offset: 27.25
y_offset: -12.8
#z_offset: 2.0
speed: 10
samples: 2
sample_retract_dist: 8
samples_tolerance: 0.050
samples_tolerance_retries: 3

[bed_mesh]
speed: 150
horizontal_move_z: 10
mesh_min: 30, 15
mesh_max: 270, 285
probe_count: 5
fade_start: 1
fade_end: 10
fade_target: 0
mesh_pps: 2
algorithm: bicubic

[bed_screws]
screw1: 50,50
screw1_name: front left
screw2: 250,50
screw2_name: front right
screw3: 250,250
screw3_name: back right
screw4: 50,250
screw4_name: back left
speed: 125

[screws_tilt_adjust]
screw1: 22.75,62.8
screw1_name: front left
screw2: 222.75,62.8
screw2_name: front right
screw3: 222.75,262.8
screw3_name: back right
screw4: 22.75,262.8
screw4_name: back left
speed: 125
screw_thread: CW-M5

#############################
# LEDS
#############################

[neopixel extruder]
pin: PB7
initial_RED: 1.0
initial_GREEN: 0
initial_BLUE: 0

[delayed_gcode Welcome_0]
initial_duration: 0
gcode:
  SET_LED LED=extruder RED=1 GREEN=0 BLUE=0

[delayed_gcode Welcome_1]
initial_duration: 0.5
gcode:
  SET_LED LED=extruder RED=0 GREEN=1 BLUE=0

[delayed_gcode Welcome_2]
initial_duration: 1
gcode:
  SET_LED LED=extruder RED=0 GREEN=0 BLUE=1

[delayed_gcode Welcome_3]
initial_duration: 1.5
gcode:
  SET_LED LED=extruder RED=1 GREEN=1 BLUE=1

[delayed_gcode Welcome_4]
initial_duration: 8
gcode:
  SET_LED LED=extruder RED=0.078 GREEN=0.568 BLUE=1

[force_move]
enable_force_move: true

[idle_timeout]
timeout: 60000

[gcode_macro START_SPEED_TEST]
description: Starts a speed/acceleration test loop.
gcode:
    {% set V = params.V|default(250)|int %}      ; Speed in mm/s
    {% set A = params.A|default(3000)|int %}     ; Accel in mm/s^2
    {% set SIZE = params.SIZE|default(150)|int %}

    {% set F = V * 60 %} ; Convert speed to mm/min for G-code
    
    {% set bed_x = printer.toolhead.axis_maximum.x|float %}
    {% set bed_y = printer.toolhead.axis_maximum.y|float %}
    {% set start_x = (bed_x - SIZE) / 2 %}
    {% set start_y = (bed_y - SIZE) / 2 %}

    G28
    G90
    G1 Z10 F3000
    G1 X{start_x} Y{start_y} F6000
    
    M204 S{A}
    M117 Testing V={V} A={A}...

    {% for i in range(500) %} ; This loop will run until you stop it
        G1 X{start_x + SIZE} Y{start_y} F{F}
        G1 X{start_x + SIZE} Y{start_y + SIZE} F{F}
        G1 X{start_x} Y{start_y + SIZE} F{F}
        G1 X{start_x} Y{start_y} F{F}
    {% endfor %}

[gcode_macro STOP_TEST]
description: Stops the printer and restarts the firmware (Emergency Stop).
gcode:
    M112 ; This is the G-code for Emergency Stop

